<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vibe Portal · 花蓮高中入口網站</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ══════════════════════════════════════════
       深色主題（預設）
    ══════════════════════════════════════════ */
    :root {
      --bg:               #0d0f14;
      --surface:          #161922;
      --surface2:         #1e2230;
      --border:           #2a2f42;
      --accent-teach:     #4fffb0;
      --accent-admin:     #ff6b6b;
      --accent-teach-dim: rgba(79,255,176,0.12);
      --accent-admin-dim: rgba(255,107,107,0.12);
      --accent-github:    #a78bfa;
      --accent-github-dim:rgba(167,139,250,0.12);
      --text:             #e8eaf0;
      --text-muted:       #6b7492;
      --text-dim:         #3a3f58;
      --shadow:           rgba(0,0,0,0.4);
      --radius: 12px;
      --font-body: 'Noto Sans TC', sans-serif;
      --font-mono: 'Space Mono', monospace;
    }

    /* ══════════════════════════════════════════
       淺色主題
    ══════════════════════════════════════════ */
    body.light {
      --bg:               #f4f5f7;
      --surface:          #ffffff;
      --surface2:         #eef0f4;
      --border:           #dde0e8;
      --accent-teach:     #0a8f5c;
      --accent-admin:     #d63a3a;
      --accent-teach-dim: rgba(10,143,92,0.1);
      --accent-admin-dim: rgba(214,58,58,0.1);
      --accent-github:    #6d43d4;
      --accent-github-dim:rgba(109,67,212,0.1);
      --text:             #1a1d2e;
      --text-muted:       #6b7280;
      --text-dim:         #b0b5c3;
      --shadow:           rgba(0,0,0,0.08);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      transition: background 0.3s, color 0.3s;
    }

    /* noise overlay（深色才顯示）*/
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 0;
      opacity: 0.6;
      transition: opacity 0.3s;
    }

    body.light::before { opacity: 0; }

    /* ── Header ── */
    header {
      position: relative; z-index: 10;
      padding: 48px 40px 32px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: flex-end; gap: 20px; flex-wrap: wrap;
      transition: border-color 0.3s;
    }

    .header-right {
      margin-left: auto;
      display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
    }

    /* ── 深淺切換按鈕 ── */
    .theme-btn {
      width: 36px; height: 36px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-muted);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .theme-btn:hover {
      border-color: var(--accent-teach);
      color: var(--accent-teach);
      transform: rotate(20deg);
    }

    /* 管理員模式徽章 */
    .admin-badge {
      display: none;
      align-items: center; gap: 6px;
      font-family: var(--font-mono); font-size: 10px; letter-spacing: 1px;
      color: var(--accent-github);
      padding: 6px 12px;
      border: 1px solid rgba(167,139,250,0.35);
      border-radius: 20px;
      background: var(--accent-github-dim);
    }

    .admin-badge.show { display: flex; }

    .admin-badge .ab-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: currentColor;
      animation: blink 2s ease-in-out infinite;
    }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

    .auth-btn {
      font-family: var(--font-mono); font-size: 11px; letter-spacing: 1px;
      padding: 6px 14px; border-radius: 20px; cursor: pointer;
      border: 1px solid var(--border);
      background: transparent; color: var(--text-muted);
      transition: all 0.2s;
    }

    .auth-btn:hover { border-color: var(--accent-github); color: var(--accent-github); }
    .auth-btn.logout { border-color: rgba(255,107,107,0.3); color: var(--accent-admin); }
    .auth-btn.logout:hover { background: var(--accent-admin-dim); }

    .logo-mark {
      width: 48px; height: 48px; border-radius: 12px;
      background: linear-gradient(135deg, var(--accent-teach), var(--accent-admin));
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-mono); font-size: 20px; font-weight: 700; color: #fff;
      flex-shrink: 0;
      box-shadow: 0 0 32px rgba(79,255,176,0.25);
      animation: pulse-glow 3s ease-in-out infinite;
    }

    body.light .logo-mark { color: #fff; box-shadow: 0 4px 16px var(--shadow); animation: none; }

    @keyframes pulse-glow {
      0%,100% { box-shadow: 0 0 32px rgba(79,255,176,0.25); }
      50%      { box-shadow: 0 0 48px rgba(79,255,176,0.45), 0 0 80px rgba(255,107,107,0.15); }
    }

    .header-text h1 { font-size: 28px; font-weight: 900; letter-spacing: -0.5px; line-height: 1; }
    .header-text p {
      font-size: 12px; font-family: var(--font-mono); color: var(--text-muted);
      margin-top: 4px; letter-spacing: 2px; text-transform: uppercase;
    }

    /* ── Main ── */
    main {
      position: relative; z-index: 10;
      max-width: 1100px; margin: 0 auto; padding: 40px 40px 60px;
    }

    /* ── 登入對話框 ── */
    #login-overlay {
      position: fixed; inset: 0;
      background: rgba(13,15,20,0.85);
      backdrop-filter: blur(6px);
      z-index: 600;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s;
    }

    body.light #login-overlay { background: rgba(100,110,130,0.5); }
    #login-overlay.show { opacity: 1; pointer-events: all; }

    .login-box {
      background: var(--surface);
      border: 1px solid rgba(167,139,250,0.3);
      border-radius: var(--radius);
      padding: 36px;
      width: 340px; max-width: 90vw;
      position: relative;
      transform: translateY(12px);
      transition: transform 0.2s;
      box-shadow: 0 20px 60px var(--shadow);
    }

    #login-overlay.show .login-box { transform: translateY(0); }

    .login-box::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, var(--accent-github), #6366f1);
      border-radius: var(--radius) var(--radius) 0 0;
    }

    .login-title {
      font-size: 13px; font-family: var(--font-mono);
      color: var(--accent-github); letter-spacing: 2px; text-transform: uppercase;
      margin-bottom: 8px;
    }

    .login-sub { font-size: 12px; color: var(--text-muted); margin-bottom: 24px; line-height: 1.6; }

    .login-field { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }

    .login-field label {
      font-size: 10px; font-family: var(--font-mono);
      color: var(--text-muted); letter-spacing: 2px; text-transform: uppercase;
    }

    .login-field input {
      background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
      padding: 11px 16px; color: var(--text);
      font-family: var(--font-mono); font-size: 13px;
      outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    }

    .login-field input:focus {
      border-color: var(--accent-github);
      box-shadow: 0 0 0 3px rgba(167,139,250,0.1);
    }

    .login-field input::placeholder { color: var(--text-dim); }

    .login-error {
      font-size: 12px; font-family: var(--font-mono);
      color: var(--accent-admin); margin-bottom: 14px; min-height: 18px;
    }

    .login-btns { display: flex; gap: 10px; justify-content: flex-end; }

    .login-cancel {
      padding: 9px 20px; border-radius: 8px;
      border: 1px solid var(--border); background: transparent;
      color: var(--text-muted); font-family: var(--font-mono); font-size: 12px;
      cursor: pointer; transition: all 0.15s;
    }

    .login-cancel:hover { border-color: var(--text-muted); color: var(--text); }

    .login-ok {
      padding: 9px 24px; border-radius: 8px; border: none;
      background: linear-gradient(135deg, var(--accent-github), #6366f1);
      color: #fff; font-family: var(--font-mono); font-size: 12px; font-weight: 700;
      cursor: pointer; transition: opacity 0.15s;
    }

    .login-ok:hover { opacity: 0.85; }
    .login-ok:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── 管理員工具列 ── */
    #admin-toolbar { display: none; }
    #admin-toolbar.show { display: block; }

    /* ── 未儲存提示橫幅 ── */
    #unsaved-banner {
      position: fixed; top: 0; left: 0; right: 0; z-index: 200;
      background: linear-gradient(90deg, #78350f, #92400e);
      border-bottom: 1px solid #b45309;
      padding: 10px 24px;
      display: flex; align-items: center; gap: 12px;
      font-size: 13px; font-family: var(--font-mono); color: #fde68a;
      transform: translateY(-100%);
      transition: transform 0.3s cubic-bezier(.34,1.56,.64,1);
    }

    #unsaved-banner.show { transform: translateY(0); }
    #unsaved-banner .banner-icon { font-size: 16px; flex-shrink: 0; }
    #unsaved-banner .banner-msg  { flex: 1; }

    #unsaved-banner .banner-btn {
      background: #b45309; border: 1px solid #d97706; color: #fef3c7;
      font-family: var(--font-mono); font-size: 11px; letter-spacing: 1px;
      padding: 6px 14px; border-radius: 6px; cursor: pointer;
      transition: background 0.15s; white-space: nowrap;
    }

    #unsaved-banner .banner-btn:hover { background: #d97706; }

    /* ── 共用面板 ── */
    .panel {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 32px;
      margin-top: 24px; position: relative; overflow: hidden;
      animation: slide-in 0.5s ease both;
      box-shadow: 0 2px 12px var(--shadow);
      transition: background 0.3s, border-color 0.3s;
    }

    @keyframes slide-in {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .panel::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, var(--accent-teach), var(--accent-admin));
    }

    .panel-title {
      font-size: 11px; font-family: var(--font-mono); color: var(--text-muted);
      letter-spacing: 3px; text-transform: uppercase; margin-bottom: 24px;
    }

    .input-row { display: flex; gap: 14px; flex-wrap: wrap; align-items: flex-end; }
    .field { display: flex; flex-direction: column; gap: 8px; }

    .field label {
      font-size: 11px; font-family: var(--font-mono); color: var(--text-muted);
      letter-spacing: 1.5px; text-transform: uppercase;
    }

    .field-url { flex: 1 1 320px; }
    .field-title { flex: 1 1 200px; }
    .field-cat { flex: 0 0 auto; }

    input[type="text"], input[type="url"] {
      background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
      padding: 11px 16px; color: var(--text);
      font-family: var(--font-mono); font-size: 13px;
      width: 100%; outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.3s;
    }

    input[type="text"]:focus, input[type="url"]:focus {
      border-color: var(--accent-teach);
      box-shadow: 0 0 0 3px rgba(79,255,176,0.1);
    }

    body.light input[type="text"]:focus, body.light input[type="url"]:focus {
      box-shadow: 0 0 0 3px rgba(10,143,92,0.12);
    }

    input::placeholder { color: var(--text-dim); }

    .cat-tabs { display: flex; gap: 6px; }

    .cat-btn {
      padding: 11px 20px; border-radius: 8px;
      border: 1px solid var(--border); background: transparent;
      color: var(--text-muted); font-family: var(--font-body);
      font-size: 14px; font-weight: 500; cursor: pointer;
      transition: all 0.2s; white-space: nowrap;
    }

    .cat-btn:hover { border-color: var(--text-muted); color: var(--text); }

    .cat-btn.teach.active {
      background: var(--accent-teach-dim); border-color: var(--accent-teach); color: var(--accent-teach);
    }

    .cat-btn.admin.active {
      background: var(--accent-admin-dim); border-color: var(--accent-admin); color: var(--accent-admin);
    }

    .add-btn {
      padding: 11px 28px; border-radius: 8px; border: none;
      background: linear-gradient(135deg, var(--accent-teach), #00d4ff);
      color: #fff; font-family: var(--font-body); font-size: 14px; font-weight: 700;
      cursor: pointer; transition: transform 0.15s, box-shadow 0.15s;
      white-space: nowrap; align-self: flex-end;
    }

    body.light .add-btn { color: #fff; }

    .add-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 24px var(--shadow); }
    .add-btn:active { transform: translateY(0); }

    /* ── 資料管理區 ── */
    .db-actions {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 24px 32px;
      margin-top: 24px; position: relative; overflow: hidden;
      box-shadow: 0 2px 12px var(--shadow);
      transition: background 0.3s, border-color 0.3s;
    }

    .db-actions::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, var(--accent-github), #6366f1);
    }

    .db-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .db-hint { font-size: 11px; font-family: var(--font-mono); color: var(--text-muted); flex: 1 1 200px; }

    .action-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 8px 16px; border-radius: 8px;
      border: 1px solid var(--border); background: transparent;
      color: var(--text-muted); font-family: var(--font-mono);
      font-size: 11px; letter-spacing: 1px; text-transform: uppercase;
      cursor: pointer; transition: all 0.2s; white-space: nowrap;
    }

    .action-btn:hover { border-color: var(--text-muted); color: var(--text); background: var(--surface2); }

    .action-btn.save-gh {
      border-color: rgba(167,139,250,0.4);
      color: var(--accent-github); background: var(--accent-github-dim);
      position: relative; overflow: hidden;
    }

    .action-btn.save-gh:hover:not(:disabled) {
      border-color: var(--accent-github); background: rgba(167,139,250,0.2);
    }

    .action-btn.save-gh:disabled { opacity: 0.4; cursor: not-allowed; }
    .action-btn.save-gh.saving { pointer-events: none; }

    .action-btn.save-gh.saving::after {
      content: '';
      position: absolute; bottom: 0; left: 0; height: 2px;
      background: var(--accent-github);
      animation: progress 1.5s ease-in-out infinite;
    }

    @keyframes progress {
      0%   { width: 0%;  left: 0; }
      50%  { width: 70%; left: 15%; }
      100% { width: 0%;  left: 100%; }
    }

    .action-btn svg { flex-shrink: 0; }

    /* ── Links Grid ── */
    .section-header {
      font-size: 11px; font-family: var(--font-mono); color: var(--text-muted);
      letter-spacing: 3px; text-transform: uppercase; margin-bottom: 20px;
    }

    .columns { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }

    .column {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden;
      animation: slide-in 0.5s ease both;
      box-shadow: 0 2px 12px var(--shadow);
      transition: background 0.3s, border-color 0.3s;
    }

    .column:nth-child(2) { animation-delay: 0.08s; }

    .col-header {
      padding: 20px 24px 16px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
      transition: border-color 0.3s;
    }

    .col-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .col-teach .col-dot { background: var(--accent-teach); box-shadow: 0 0 8px var(--accent-teach); }
    .col-admin .col-dot { background: var(--accent-admin); box-shadow: 0 0 8px var(--accent-admin); }
    body.light .col-teach .col-dot { box-shadow: none; }
    body.light .col-admin .col-dot { box-shadow: none; }

    .col-title { font-size: 15px; font-weight: 700; flex: 1; }

    .col-count {
      font-size: 11px; font-family: var(--font-mono); color: var(--text-muted);
      background: var(--bg); padding: 2px 8px; border-radius: 20px; border: 1px solid var(--border);
      transition: background 0.3s, border-color 0.3s;
    }

    .link-list { list-style: none; padding: 8px 0; min-height: 60px; }

    .link-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 24px; transition: background 0.15s;
      animation: fade-in 0.3s ease both;
    }

    @keyframes fade-in {
      from { opacity: 0; transform: translateX(-8px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .link-item:hover { background: var(--surface2); }

    .link-icon {
      width: 28px; height: 28px; border-radius: 6px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; font-family: var(--font-mono);
    }

    .col-teach .link-icon { background: var(--accent-teach-dim); color: var(--accent-teach); }
    .col-admin .link-icon { background: var(--accent-admin-dim); color: var(--accent-admin); }

    .link-info { flex: 1; min-width: 0; }

    .link-name {
      font-size: 13px; font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .link-url {
      font-size: 11px; font-family: var(--font-mono); color: var(--text-muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .link-open {
      font-size: 11px; font-family: var(--font-mono); text-decoration: none;
      border-radius: 6px; padding: 4px 10px; transition: all 0.2s; flex-shrink: 0;
      border: 1px solid rgba(79,255,176,0.3);
      color: var(--accent-teach); background: var(--accent-teach-dim);
    }

    .link-open:hover {
      background: rgba(79,255,176,0.2); border-color: var(--accent-teach);
    }

    .col-admin .link-open {
      border-color: rgba(255,107,107,0.3);
      color: var(--accent-admin); background: var(--accent-admin-dim);
    }

    .col-admin .link-open:hover {
      background: rgba(255,107,107,0.2); border-color: var(--accent-admin);
    }

    .link-del {
      background: none; border: none; color: var(--text-dim);
      cursor: pointer; font-size: 14px; padding: 4px 6px;
      border-radius: 6px; transition: all 0.15s;
      flex-shrink: 0; line-height: 1; display: none;
    }

    body.admin-mode .link-del { display: block; }
    .link-del:hover { background: rgba(255,107,107,0.12); color: var(--accent-admin); }

    /* ── 拖曳把手（管理員模式才顯示）── */
    .drag-handle {
      display: none;
      cursor: grab; flex-shrink: 0;
      color: var(--text-dim); padding: 4px 4px;
      font-size: 14px; line-height: 1;
      user-select: none;
      transition: color 0.15s;
    }

    body.admin-mode .drag-handle { display: flex; align-items: center; }
    .drag-handle:hover { color: var(--text-muted); }
    .drag-handle:active { cursor: grabbing; }

    .link-item.dragging {
      opacity: 0.4;
      background: var(--surface2);
    }

    .link-item.drag-over-top {
      border-top: 2px solid var(--accent-teach);
    }

    .link-item.drag-over-bottom {
      border-bottom: 2px solid var(--accent-teach);
    }

    .col-admin .link-item.drag-over-top {
      border-top-color: var(--accent-admin);
    }

    .col-admin .link-item.drag-over-bottom {
      border-bottom-color: var(--accent-admin);
    }

    .empty {
      text-align: center; font-size: 12px; font-family: var(--font-mono);
      color: var(--text-dim); padding: 32px 20px;
    }

    /* ── 刪除確認 ── */
    #confirm-overlay {
      position: fixed; inset: 0;
      background: rgba(13,15,20,0.8); backdrop-filter: blur(4px);
      z-index: 500; display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }

    body.light #confirm-overlay { background: rgba(100,110,130,0.5); }
    #confirm-overlay.show { opacity: 1; pointer-events: all; }

    .confirm-box {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 32px;
      max-width: 340px; width: 90%;
      position: relative; transform: translateY(12px); transition: transform 0.2s;
      box-shadow: 0 20px 60px var(--shadow);
    }

    #confirm-overlay.show .confirm-box { transform: translateY(0); }

    .confirm-box::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, var(--accent-admin), #ff9a9a);
      border-radius: var(--radius) var(--radius) 0 0;
    }

    .confirm-title {
      font-size: 13px; font-family: var(--font-mono); color: var(--accent-admin);
      letter-spacing: 2px; text-transform: uppercase; margin-bottom: 12px;
    }

    .confirm-msg { font-size: 14px; color: var(--text); margin-bottom: 24px; line-height: 1.6; }
    .confirm-name { font-weight: 700; color: var(--accent-admin); }
    .confirm-btns { display: flex; gap: 10px; justify-content: flex-end; }

    .confirm-cancel {
      padding: 8px 20px; border-radius: 8px;
      border: 1px solid var(--border); background: transparent;
      color: var(--text-muted); font-family: var(--font-mono); font-size: 12px;
      cursor: pointer; transition: all 0.15s;
    }

    .confirm-cancel:hover { border-color: var(--text-muted); color: var(--text); }

    .confirm-ok {
      padding: 8px 20px; border-radius: 8px;
      border: 1px solid rgba(255,107,107,0.4);
      background: var(--accent-admin-dim); color: var(--accent-admin);
      font-family: var(--font-mono); font-size: 12px;
      cursor: pointer; transition: all 0.15s;
    }

    .confirm-ok:hover { background: rgba(255,107,107,0.25); border-color: var(--accent-admin); }

    /* Toast */
    #toast {
      position: fixed; bottom: 32px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; padding: 12px 24px;
      font-size: 13px; font-family: var(--font-mono); color: var(--accent-teach);
      z-index: 1000; transition: transform 0.3s cubic-bezier(.34,1.56,.64,1);
      pointer-events: none; max-width: 90vw; text-align: center;
      box-shadow: 0 8px 24px var(--shadow);
    }

    #toast.show  { transform: translateX(-50%) translateY(0); }
    #toast.error { color: var(--accent-admin); }

    /* RWD */
    @media (max-width: 640px) {
      header { padding: 28px 20px 20px; }
      main   { padding: 28px 20px 48px; }
      .columns { grid-template-columns: 1fr; }
      .input-row { flex-direction: column; }
      .add-btn { width: 100%; text-align: center; }
    }
  </style>
</head>
<body>

  <!-- 未儲存提示橫幅 -->
  <div id="unsaved-banner">
    <span class="banner-icon">⚠</span>
    <span class="banner-msg">資料已變更，尚未儲存至 GitHub</span>
    <button class="banner-btn" onclick="saveToGitHub()">立即儲存</button>
  </div>

  <!-- 刪除確認對話框 -->
  <div id="confirm-overlay">
    <div class="confirm-box">
      <div class="confirm-title">// 確認刪除</div>
      <div class="confirm-msg">
        確定要刪除 <span class="confirm-name" id="confirm-target-name"></span>？<br>
        <span style="font-size:12px;color:var(--text-muted)">此動作無法復原。</span>
      </div>
      <div class="confirm-btns">
        <button class="confirm-cancel" onclick="closeConfirm()">取消</button>
        <button class="confirm-ok" onclick="confirmDelete()">確認刪除</button>
      </div>
    </div>
  </div>

  <!-- 登入對話框 -->
  <div id="login-overlay">
    <div class="login-box">
      <div class="login-title">// 管理員登入</div>
      <p class="login-sub">輸入管理密碼以進入編輯模式。密碼由 Cloudflare Worker 驗證，不在此網頁儲存。</p>
      <div class="login-field">
        <label>管理密碼</label>
        <input type="password" id="login-pw" placeholder="••••••••" autocomplete="current-password" />
      </div>
      <div class="login-error" id="login-error"></div>
      <div class="login-btns">
        <button class="login-cancel" onclick="closeLogin()">取消</button>
        <button class="login-ok" id="login-ok-btn" onclick="doLogin()">登入</button>
      </div>
    </div>
  </div>

  <!-- Header -->
  <header>
    <div class="logo-mark">VP</div>
    <div class="header-text">
      <h1>Vibe Portal</h1>
      <p>校園氛圍編碼網站</p>
    </div>
    <div class="header-right">
      <!-- 深淺切換 -->
      <button class="theme-btn" id="theme-btn" onclick="toggleTheme()" title="切換深色／淺色">🌙</button>
      <div class="admin-badge" id="admin-badge">
        <div class="ab-dot"></div>
        <span>管理員模式</span>
      </div>
      <button class="auth-btn" id="auth-btn" onclick="handleAuthBtn()">管理員登入</button>
    </div>
  </header>

  <main>

    <!-- 連結目錄 -->
    <div class="section-header">// 連結目錄</div>
    <div class="columns">
      <div class="column col-teach">
        <div class="col-header">
          <div class="col-dot"></div>
          <span class="col-title">教學</span>
          <span class="col-count" id="count-teach">0</span>
        </div>
        <ul class="link-list" id="list-teach"></ul>
      </div>
      <div class="column col-admin">
        <div class="col-header">
          <div class="col-dot"></div>
          <span class="col-title">行政</span>
          <span class="col-count" id="count-admin">0</span>
        </div>
        <ul class="link-list" id="list-admin"></ul>
      </div>
    </div>

    <!-- 管理員工具列 -->
    <div id="admin-toolbar">
      <div class="panel">
        <div class="panel-title">// 新增連結</div>
        <div class="input-row">
          <div class="field field-title">
            <label>名稱</label>
            <input type="text" id="inp-title" placeholder="網站名稱" />
          </div>
          <div class="field field-url">
            <label>網址</label>
            <input type="url" id="inp-url" placeholder="https://example.com" />
          </div>
          <div class="field field-cat">
            <label>分類</label>
            <div class="cat-tabs">
              <button class="cat-btn teach active" data-cat="教學" onclick="selectCat(this)">教學</button>
              <button class="cat-btn admin" data-cat="行政" onclick="selectCat(this)">行政</button>
            </div>
          </div>
          <button class="add-btn" onclick="addLink()">＋ 新增</button>
        </div>
      </div>

      <div class="db-actions">
        <div class="panel-title">// 資料管理</div>
        <div class="db-row">
          <button class="action-btn save-gh" id="btn-save" onclick="saveToGitHub()">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/>
            </svg>
            儲存至 GitHub
          </button>
          <input type="file" id="file-input" accept=".json" style="display:none" onchange="importJSON(event)" />
          <button class="action-btn" onclick="document.getElementById('file-input').click()">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            匯入備份
          </button>
          <button class="action-btn" onclick="exportJSON()">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            備份下載
          </button>
          <span class="db-hint">修改後按「儲存至 GitHub」，約 1 分鐘後網頁生效。</span>
        </div>
      </div>
    </div>

  </main>

  <div id="toast"></div>

  <script>
    // ══════════════════════════════════════════
    //  Worker URL（預先載入，不再顯示設定欄）
    // ══════════════════════════════════════════
    // Worker URL 固定，不從 localStorage 讀取
    let workerUrl = 'https://leocloud.dfleoyang.workers.dev';

    function loadWorkerUrl() {
      // 固定網址，無需任何設定
    }

    // ══════════════════════════════════════════
    //  深色 / 淺色主題
    // ══════════════════════════════════════════
    const THEME_KEY = 'vibe_portal_theme';

    function loadTheme() {
      const saved = localStorage.getItem(THEME_KEY) || 'dark';
      applyTheme(saved, false);
    }

    function toggleTheme() {
      const isLight = document.body.classList.contains('light');
      applyTheme(isLight ? 'dark' : 'light', true);
    }

    function applyTheme(theme, save) {
      const isLight = theme === 'light';
      document.body.classList.toggle('light', isLight);
      document.getElementById('theme-btn').textContent = isLight ? '🌙' : '☀️';
      if (save) localStorage.setItem(THEME_KEY, theme);
    }

    // ══════════════════════════════════════════
    //  狀態
    // ══════════════════════════════════════════
    let db      = { links: [], nextId: 1, sha: null };
    let isAdmin = false;
    let adminPw = '';
    let selectedCat     = '教學';
    let hasUnsaved      = false;
    let pendingDeleteId = null;

    // ══════════════════════════════════════════
    //  讀取資料
    // ══════════════════════════════════════════
    async function loadDB() {
      if (!workerUrl) return;
      setLoading(true);
      try {
        const res = await fetch(`${workerUrl}/api/db`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        db = { links: data.links || [], nextId: data.nextId || 1, sha: data.sha || null };
        render();
      } catch (err) {
        showFetchError(err.message);
      } finally {
        setLoading(false);
      }
    }

    function setLoading(on) {
      ['list-teach','list-admin'].forEach(id => {
        if (on) document.getElementById(id).innerHTML = `<li class="empty">讀取中…</li>`;
      });
    }

    function showFetchError(msg) {
      ['list-teach','list-admin'].forEach(id => {
        document.getElementById(id).innerHTML =
          `<li class="empty" style="color:var(--accent-admin)">
            ⚠ 無法讀取資料<br>
            <span style="font-size:10px;opacity:.7">${escHtml(msg)}</span>
          </li>`;
      });
    }

    // ══════════════════════════════════════════
    //  管理員登入
    // ══════════════════════════════════════════
    function handleAuthBtn() {
      if (isAdmin) { doLogout(); } else { openLogin(); }
    }

    function openLogin() {
      document.getElementById('login-pw').value = '';
      document.getElementById('login-error').textContent = '';
      document.getElementById('login-overlay').classList.add('show');
      setTimeout(() => document.getElementById('login-pw').focus(), 200);
    }

    function closeLogin() {
      document.getElementById('login-overlay').classList.remove('show');
    }

    async function doLogin() {
      const pw  = document.getElementById('login-pw').value;
      const btn = document.getElementById('login-ok-btn');
      const err = document.getElementById('login-error');

      if (!pw) { err.textContent = '請輸入密碼'; return; }

      btn.disabled = true;
      btn.textContent = '驗證中…';
      err.textContent = '';

      try {
        const res = await fetch(`${workerUrl}/api/db`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'X-Admin-Password': pw,
          },
          body: JSON.stringify(db),
        });

        if (res.status === 401) { err.textContent = '密碼錯誤，請重試。'; return; }
        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        const result = await res.json();
        if (result.sha) db.sha = result.sha;

        adminPw = pw;
        setAdminMode(true);
        closeLogin();
        toast('✓ 已進入管理員模式');

      } catch (e) {
        err.textContent = `連線失敗：${e.message}`;
      } finally {
        btn.disabled = false;
        btn.textContent = '登入';
      }
    }

    function doLogout() {
      adminPw = '';
      setAdminMode(false);
      toast('已登出管理員模式');
    }

    function setAdminMode(on) {
      isAdmin = on;
      document.body.classList.toggle('admin-mode', on);
      document.getElementById('admin-badge').classList.toggle('show', on);
      document.getElementById('admin-toolbar').classList.toggle('show', on);
      const btn = document.getElementById('auth-btn');
      btn.textContent = on ? '登出' : '管理員登入';
      btn.className   = on ? 'auth-btn logout' : 'auth-btn';
      if (!on) clearUnsaved();
      render();
    }

    // ══════════════════════════════════════════
    //  儲存至 GitHub
    // ══════════════════════════════════════════
    async function saveToGitHub() {
      if (!isAdmin) { toast('請先登入管理員', true); return; }

      const btn = document.getElementById('btn-save');
      btn.classList.add('saving');

      try {
        const res = await fetch(`${workerUrl}/api/db`, {
          method: 'PUT',
          headers: {
            'Content-Type':     'application/json',
            'X-Admin-Password': adminPw,
          },
          body: JSON.stringify(db),
        });

        if (res.status === 401) { doLogout(); toast('工作階段已過期，請重新登入', true); return; }
        if (!res.ok) {
          const errData = await res.json().catch(() => ({}));
          throw new Error(errData.error || `HTTP ${res.status}`);
        }

        const result = await res.json();
        if (result.sha) db.sha = result.sha;
        clearUnsaved();
        toast('✓ 已儲存至 GitHub，約 1 分鐘後網頁生效');

      } catch (err) {
        toast(`❌ 儲存失敗：${err.message}`, true);
      } finally {
        btn.classList.remove('saving');
      }
    }

    // ══════════════════════════════════════════
    //  分類 / 新增 / 刪除
    // ══════════════════════════════════════════
    function selectCat(btn) {
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedCat = btn.dataset.cat;
    }

    function addLink() {
      const title = document.getElementById('inp-title').value.trim();
      const url   = document.getElementById('inp-url').value.trim();

      if (!title) { toast('請輸入名稱', true); return; }

      try {
        const p = new URL(url);
        if (!['http:','https:'].includes(p.protocol)) throw new Error();
      } catch { toast('請輸入有效網址（https://…）', true); return; }

      db.links.push({ id: db.nextId++, category: selectedCat, title, url });
      document.getElementById('inp-title').value = '';
      document.getElementById('inp-url').value   = '';
      markUnsaved();
      render();
      toast('✓ 已新增：' + title);
    }

    function deleteLink(id) {
      const item = db.links.find(l => l.id === id);
      if (!item) return;
      pendingDeleteId = id;
      document.getElementById('confirm-target-name').textContent = item.title;
      document.getElementById('confirm-overlay').classList.add('show');
    }

    function closeConfirm() {
      pendingDeleteId = null;
      document.getElementById('confirm-overlay').classList.remove('show');
    }

    function confirmDelete() {
      if (pendingDeleteId === null) return;
      db.links = db.links.filter(l => l.id !== pendingDeleteId);
      pendingDeleteId = null;
      document.getElementById('confirm-overlay').classList.remove('show');
      markUnsaved();
      render();
      toast('已刪除');
    }

    document.getElementById('confirm-overlay').addEventListener('click', function(e) {
      if (e.target === this) closeConfirm();
    });

    function markUnsaved() {
      hasUnsaved = true;
      document.getElementById('unsaved-banner').classList.add('show');
    }

    function clearUnsaved() {
      hasUnsaved = false;
      document.getElementById('unsaved-banner').classList.remove('show');
    }

    // ══════════════════════════════════════════
    //  渲染
    // ══════════════════════════════════════════
    function render() {
      const teach = db.links.filter(l => l.category === '教學');
      const admin = db.links.filter(l => l.category === '行政');
      document.getElementById('count-teach').textContent = teach.length;
      document.getElementById('count-admin').textContent = admin.length;
      document.getElementById('list-teach').innerHTML = renderList(teach);
      document.getElementById('list-admin').innerHTML = renderList(admin);
      // 每次渲染後重新綁定拖曳事件
      if (typeof initDrag === 'function') initDrag();
    }

    function renderList(items) {
      if (!items.length) return `<li class="empty">— 尚無連結 —</li>`;
      return items.map((l, i) => {
        const initial  = (l.title || '?')[0];
        const shortUrl = l.url.replace(/^https?:\/\//, '').replace(/\/$/, '');
        return `
          <li class="link-item" draggable="true" data-id="${l.id}" style="animation-delay:${i * 0.05}s">
            <div class="drag-handle" title="拖曳排序">⠿</div>
            <div class="link-icon">${initial}</div>
            <div class="link-info">
              <div class="link-name">${escHtml(l.title)}</div>
              <div class="link-url">${escHtml(shortUrl)}</div>
            </div>
            <a class="link-open" href="${escHtml(l.url)}" target="_blank" rel="noopener">開啟</a>
            <button class="link-del" title="刪除" onclick="deleteLink(${l.id})">✕</button>
          </li>`;
      }).join('');
    }

    // ══════════════════════════════════════════
    //  拖曳排序
    // ══════════════════════════════════════════
    let dragSrcId = null;

    function initDrag() {
      ['list-teach', 'list-admin'].forEach(listId => {
        const list = document.getElementById(listId);
        if (!list) return;

        list.addEventListener('dragstart', e => {
          if (!isAdmin) return;
          const li = e.target.closest('.link-item');
          if (!li) return;
          dragSrcId = parseInt(li.dataset.id);
          li.classList.add('dragging');
          e.dataTransfer.effectAllowed = 'move';
        });

        list.addEventListener('dragend', e => {
          const li = e.target.closest('.link-item');
          if (li) li.classList.remove('dragging');
          list.querySelectorAll('.link-item').forEach(item => {
            item.classList.remove('drag-over-top', 'drag-over-bottom');
          });
          dragSrcId = null;
        });

        list.addEventListener('dragover', e => {
          if (!isAdmin || dragSrcId === null) return;
          e.preventDefault();
          e.dataTransfer.dropEffect = 'move';
          const li = e.target.closest('.link-item');
          if (!li || parseInt(li.dataset.id) === dragSrcId) return;
          list.querySelectorAll('.link-item').forEach(item => {
            item.classList.remove('drag-over-top', 'drag-over-bottom');
          });
          const rect = li.getBoundingClientRect();
          const mid  = rect.top + rect.height / 2;
          li.classList.add(e.clientY < mid ? 'drag-over-top' : 'drag-over-bottom');
        });

        list.addEventListener('dragleave', e => {
          const li = e.target.closest('.link-item');
          if (li) li.classList.remove('drag-over-top', 'drag-over-bottom');
        });

        list.addEventListener('drop', e => {
          if (!isAdmin || dragSrcId === null) return;
          e.preventDefault();
          const li = e.target.closest('.link-item');
          if (!li) return;
          const targetId = parseInt(li.dataset.id);
          if (targetId === dragSrcId) return;
          const isTop = li.classList.contains('drag-over-top');
          const srcIndex = db.links.findIndex(l => l.id === dragSrcId);
          const targetIndex = db.links.findIndex(l => l.id === targetId);
          if (srcIndex === -1 || targetIndex === -1) return;
          const [moved] = db.links.splice(srcIndex, 1);
          const newTargetIndex = db.links.findIndex(l => l.id === targetId);
          db.links.splice(isTop ? newTargetIndex : newTargetIndex + 1, 0, moved);
          markUnsaved();
          render();
          initDrag();
        });
      });
    }

    function escHtml(s) {
      return String(s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ══════════════════════════════════════════
    //  備援匯出 / 匯入
    // ══════════════════════════════════════════
    function exportJSON() {
      const json = JSON.stringify({ links: db.links, nextId: db.nextId }, null, 2);
      const blob = new Blob([json], { type: 'application/json' });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href = url; a.download = 'db.json'; a.click();
      URL.revokeObjectURL(url);
      toast('✓ 已下載 db.json（備份用）');
    }

    function importJSON(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        try {
          const imported = JSON.parse(e.target.result);
          if (!Array.isArray(imported.links)) throw new Error('格式錯誤');
          const maxId = imported.links.reduce((m, l) => Math.max(m, l.id || 0), 0);
          db.links  = imported.links;
          db.nextId = Math.max(imported.nextId || 0, maxId + 1);
          markUnsaved();
          render();
          toast(`✓ 已匯入 ${db.links.length} 筆資料（尚未儲存）`);
        } catch (err) {
          toast('❌ 匯入失敗：' + err.message, true);
        }
        event.target.value = '';
      };
      reader.readAsText(file);
    }

    // ══════════════════════════════════════════
    //  Toast
    // ══════════════════════════════════════════
    let toastTimer;
    function toast(msg, isError = false) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.className = isError ? 'show error' : 'show';
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => { el.className = ''; }, isError ? 4500 : 3000);
    }

    // ══════════════════════════════════════════
    //  快捷鍵
    // ══════════════════════════════════════════
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') { closeConfirm(); closeLogin(); }
      if (e.key === 'Enter') {
        if (['inp-url','inp-title'].includes(e.target.id)) addLink();
        if (e.target.id === 'login-pw') doLogin();
      }
    });

    window.addEventListener('beforeunload', e => {
      if (hasUnsaved) { e.preventDefault(); e.returnValue = ''; }
    });

    // ── 啟動 ──
    loadTheme();
    loadWorkerUrl();
    loadDB().then(() => initDrag());
  </script>
</body>
</html>
